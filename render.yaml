# Render Blueprint: one-click deploy of the backend API + a free Postgres.
# Deploy: render.com -> New -> Blueprint -> connect this repo -> Apply.
# The frontend is hosted separately on GitHub Pages (see .github/workflows/pages.yml).
services:
  - type: web
    name: cancer-omics-api
    runtime: docker
    repo: https://github.com/xX-its-amit-Xx/cancer-omics-browser
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cancer-omics-db
          property: connectionString
      - key: DATA_SOURCE
        value: synthetic

databases:
  - name: cancer-omics-db
    plan: free
